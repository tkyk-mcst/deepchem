name: mol_app
description: Molecular Property Prediction Web App powered by DeepChem
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  file_picker: ^8.1.2
  csv: ^6.0.0
  fl_chart: ^0.70.0
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.2
  flutter_svg: ^2.0.10+1
  provider: ^6.1.2
  go_router: ^13.2.0
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
